<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>souilX</title>
    <meta name="description" content="souilX — Your intelligent, natural conversational assistant with multimodal capabilities.">

    <meta property="og:title" content="souilX">
    <meta property="og:description" content="Your intelligent, natural conversational assistant with multimodal capabilities.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/icons/icon-512.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="souilX">
    <meta name="twitter:description" content="Your intelligent, natural conversational assistant with multimodal capabilities.">
    <meta name="twitter:image" content="/icons/icon-512.png">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="souilX">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.3/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/bash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/sql.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/diff.min.js"></script>
    <script src="widget-renderer.js"></script>
    <script src="pdf-viewer.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Overlay (mobile/tablet) -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar — Floating Popup -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">souilX</span>
                <button class="sidebar-close-btn" id="sidebar-close-btn" title="Close">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            
            <button class="sidebar-action-btn new-chat-btn" id="new-chat-btn">
                <i class="fa-solid fa-plus"></i>
                <span>New Chat</span>
            </button>
            
            <div class="sidebar-section">
                <div class="sidebar-section-title">Recent</div>
                <div class="chat-list" id="chat-list">
                    <!-- Populated by JS -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="user-avatar" id="user-avatar-display">U</div>
                    <div class="user-info">
                        <span class="user-name" id="user-name-display">User</span>
                        
                    </div>
                </div>
                <button class="logout-btn" id="logout-btn" title="Log Out">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="Toggle Sidebar">☰</button>
                </div>
                <div class="header-center">
                    <div class="header-title">souilX</div>
                </div>
                <div class="header-right">
                    <button class="action-btn" id="header-new-chat-btn" title="New Chat"><i class="fa-solid fa-pen"></i></button>
                    <button class="action-btn" id="share-btn" title="Share"><i class="fa-solid fa-share-nodes"></i></button>
                    <button class="action-btn" id="clear-chat-btn" title="Clear Chat"><i class="fa-solid fa-trash"></i></button>
                </div>
            </header>

            <!-- Drop Zone Overlay -->
            <div class="drop-zone-overlay" id="drop-zone-overlay">
                <div class="drop-zone-content">
                    <div class="drop-zone-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
                    <h3>Drop files here</h3>
                    <p>Images, documents, code files</p>
                </div>
            </div>

            <div class="chat-container" id="chat-container">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon"><i class="fa-solid fa-sparkles"></i></div>
                    <h1>Welcome to souilX</h1>
                    <p>Your intelligent, natural conversational assistant</p>
                    
                    <div class="suggestion-cards">
                        <button class="suggestion-card" onclick="sendSuggestion('Write a funny poem about coding bugs')">
                            <i class="fa-solid fa-pen-nib"></i>
                            <span>Write a funny poem about coding bugs</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion('can you help me in my work?')">
                            <i class="fa-solid fa-language"></i>
                            <span>Can you help me in my work?</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion(`Explain artificial intelligence in Darija`)">
                            <i class="fa-solid fa-brain"></i>
                            <span>Explain artificial intelligence in Darija</span>
                        </button>
                        <button class="suggestion-card" onclick="sendSuggestion('Write a JavaScript function to sort an array')">
                            <i class="fa-solid fa-code"></i>
                            <span>Write a JavaScript function to sort an array</span>
                        </button>
                    </div>
                </div>
                
                <div class="messages-wrapper" id="messages-wrapper"></div>
                
                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <div class="input-area">
                <div class="input-controls" id="input-controls">
                    <button class="stop-btn" id="stop-btn" style="display: none;">
                        <i class="fa-solid fa-circle-stop"></i> Stop generating
                    </button>
                    <button class="regen-btn" id="regen-btn" style="display: none;">
                        <i class="fa-solid fa-rotate-right"></i> Regenerate
                    </button>
                </div>

                <!-- File Preview Strip -->
                <div class="file-preview-strip" id="file-preview-strip"></div>
                
                <div class="input-wrapper" id="input-wrapper">
                    <input type="file" id="file-input" style="display: none;" 
                           accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.mp4,.mov,.webm"
                           multiple>
                    
                    <!-- Attach Button + Popup Menu -->
                    <div class="attach-menu-container" id="attach-menu-container">
                        <button class="attach-btn" id="attach-btn" title="Attach files"><i class="fa-solid fa-plus"></i></button>
                        
                        <div class="attach-menu" id="attach-menu">
                            <button class="attach-menu-item" id="menu-add-files">
                                <div class="attach-menu-icon"><i class="fa-solid fa-paperclip"></i></div>
                                <span>Add photos & files</span>
                            </button>
                            <button class="attach-menu-item" id="menu-screenshot">
                                <div class="attach-menu-icon"><i class="fa-solid fa-desktop"></i></div>
                                <span>Take screenshot</span>
                            </button>
                            <button class="attach-menu-item" id="menu-camera">
                                <div class="attach-menu-icon"><i class="fa-solid fa-camera"></i></div>
                                <span>Take photo</span>
                            </button>
                            <button class="attach-menu-item" id="menu-recent">
                                <div class="attach-menu-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
                                <span>Recent files</span>
                            </button>
                        </div>
                    </div>

                    <textarea id="message-input" placeholder="Message souilX..." rows="1"></textarea>
                    
                    <button class="send-btn" id="send-btn" disabled>
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
                <div class="disclaimer">souilX may produce inaccurate information. Please verify important details.</div>
            </div>
        </main>
    </div>

    <!-- Camera Modal -->
    <div class="camera-modal" id="camera-modal" style="display: none;">
        <div class="camera-modal-content">
            <div class="camera-header">
                <h3><i class="fa-solid fa-camera"></i> Take Photo</h3>
                <button class="camera-close-btn" id="camera-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="camera-body">
                <video id="camera-preview" autoplay playsinline></video>
                <canvas id="camera-canvas" style="display: none;"></canvas>
            </div>
            <div class="camera-footer">
                <button class="camera-flip-btn" id="camera-flip-btn" title="Flip camera">
                    <i class="fa-solid fa-camera-rotate"></i>
                </button>
                <button class="camera-capture-btn" id="camera-capture-btn" title="Capture">
                    <div class="capture-ring"></div>
                </button>
                <div style="width: 44px;"></div>
            </div>
        </div>
    </div>

    <!-- Recent Files Modal -->
    <div class="recent-files-modal" id="recent-files-modal" style="display: none;">
        <div class="recent-files-modal-content">
            <div class="recent-files-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Files</h3>
                <button class="recent-files-close-btn" id="recent-files-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="recent-files-body" id="recent-files-body"></div>
            <div class="recent-files-footer">
                <span class="recent-files-hint"><i class="fa-solid fa-circle-info"></i> Click a file to re-upload it from your device</span>
            </div>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox-modal" id="lightbox-modal">
        <button class="lightbox-close" id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
        <img id="lightbox-img" src="" alt="">
        <div class="lightbox-counter" id="lightbox-counter"></div>
        <button class="lightbox-download" id="lightbox-download"><i class="fa-solid fa-download"></i> Download</button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="persistence.js"></script>
    <script src="app.js"></script>
</body>
</html>
