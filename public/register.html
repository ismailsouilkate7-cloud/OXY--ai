<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up — souilX</title>
    <meta name="description" content="Create your souilX account — Your intelligent, natural conversational assistant.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== Local fallbacks (mirror chat's :root exactly) ===== */
        :root {
            --bg-base: #0a0a0a;
            --bg-surface: #111111;
            --bg-elevated: #1f1f1f;
            --bg-raised: #2a2a2a;
            --bg-hover: rgba(255, 255, 255, 0.05);
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --text-tertiary: #6b6b6b;
            --text-placeholder: #555;
            --accent: #6366f1;
            --accent-hover: #7c7ff7;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --accent-soft: rgba(99, 102, 241, 0.1);
            --accent-gradient: linear-gradient(135deg, #6366f1, #8b5cf6);
            --border: transparent;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 16px;
            --radius-2xl: 20px;
            --shadow-sm: 0 6px 18px rgba(0,0,0,0.45);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.55);
            --shadow-lg: 0 18px 48px rgba(0,0,0,0.6);
            --shadow-xl: 0 28px 80px rgba(0,0,0,0.7);
        }

        body {
            background: var(--bg-base);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif);
            color: var(--text-primary);
            padding: clamp(16px, 4vw, 40px);
            position: relative;
        }
        .bg-glow {
            position: fixed;
            width: min(50vw, 600px);
            height: min(50vw, 600px);
            background: radial-gradient(circle, rgba(99, 102, 241, 0.14) 0%, rgba(10, 10, 10, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            top: -20%;
            left: -10%;
            pointer-events: none;
            animation: float 12s infinite alternate ease-in-out;
        }
        .bg-glow:nth-child(2) {
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(10, 10, 10, 0) 70%);
            top: auto;
            bottom: -20%;
            left: auto;
            right: -10%;
            animation-delay: -6s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
            position: relative;
            z-index: 1;
        }
        .auth-header {
            text-align: center;
            margin-bottom: clamp(20px, 3vw, 28px);
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: clamp(16px, 2vw, 20px);
            text-decoration: none;
        }
        .auth-logo-ring {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            position: relative;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .auth-logo-ring::after {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            background: var(--bg-base);
        }
        .auth-logo-text {
            font-size: clamp(20px, 2.5vw, 22px);
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .auth-logo-text span:first-child {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .auth-logo-text span:last-child { color: var(--text-primary); }
        .auth-header h1 {
            font-size: clamp(22px, 3vw, 26px);
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }
        .auth-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: clamp(20px, 3vw, 28px);
            box-shadow: var(--shadow-xl);
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: 100%;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 14px;
            border-radius: var(--radius-md);
            outline: none;
            font-family: inherit;
            font-size: 14px !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:hover { background: rgba(255, 255, 255, 0.04); }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .form-group input::placeholder { color: var(--text-placeholder); }
        .auth-btn {
            width: 100%;
            background: var(--accent-gradient);
            color: #fff;
            border: none;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            min-height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }
        .auth-btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .auth-btn:active { transform: translateY(0); }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #ef4444;
            padding: 10px 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
        }
        .auth-error.visible { display: block; }
        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-footer a:hover { color: var(--accent-hover); text-decoration: underline; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .auth-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <div class="auth-logo-ring"></div>
                <div class="auth-logo-text"><span>souil</span><span>X</span></div>
            </a>
            <h1>Create an account</h1>
            <p>Join souilX and start conversing</p>
        </div>
        <div class="auth-card">
            <div class="auth-error" id="auth-error"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required autocomplete="name" autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password (min. 6 characters)" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('auth-error');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
            errorEl.classList.remove('visible');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.redirect || '/chat';
                } else {
                    errorEl.textContent = data.error || 'Registration failed. Please try again.';
                    errorEl.classList.add('visible');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        });
    </script>
    <script src="persistence.js"></script>
</body>
</html>
