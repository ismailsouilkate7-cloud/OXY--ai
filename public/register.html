<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign Up — OXY AI</title>
    <meta name="description" content="Create your OXY AI account — Your intelligent, natural conversational assistant.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-family, 'Outfit', sans-serif);
            padding: clamp(16px, 4vw, 40px);
            position: relative;
        }
        .bg-glow {
            position: fixed;
            width: min(50vw, 600px);
            height: min(50vw, 600px);
            background: radial-gradient(circle, rgba(168, 85, 247, 0.12) 0%, rgba(15, 15, 15, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            top: -20%;
            left: -10%;
            pointer-events: none;
            animation: float 12s infinite alternate ease-in-out;
        }
        .bg-glow:nth-child(2) {
            top: auto;
            bottom: -20%;
            left: auto;
            right: -10%;
            animation-delay: -6s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }
        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.5s ease;
            position: relative;
            z-index: 1;
        }
        .auth-header {
            text-align: center;
            margin-bottom: clamp(24px, 4vw, 36px);
        }
        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: clamp(16px, 2vw, 20px);
            text-decoration: none;
        }
        .auth-logo-ring {
            width: 36px;
            height: 36px;
            border: 3px solid #a855f7;
            border-radius: 50%;
            position: relative;
        }
        .auth-logo-text {
            font-size: clamp(22px, 3vw, 26px);
            font-weight: 700;
            letter-spacing: 1px;
        }
        .auth-logo-text span:first-child { color: #a855f7; }
        .auth-logo-text span:last-child { color: var(--text-primary); }
        .auth-header h1 {
            font-size: clamp(22px, 3vw, 28px);
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }
        .auth-header p {
            color: var(--text-secondary);
            font-size: clamp(14px, 1.5vw, 15px);
        }
        .auth-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl, 18px);
            padding: clamp(24px, 4vw, 36px);
            box-shadow: var(--shadow-xl, 0 16px 48px rgba(0,0,0,0.5));
        }
        .form-group {
            margin-bottom: clamp(16px, 2vw, 20px);
        }
        .form-group label {
            display: block;
            font-size: clamp(13px, 1.2vw, 14px);
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="text"] {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: clamp(12px, 2vw, 14px) clamp(14px, 2vw, 16px);
            border-radius: var(--radius-md, 10px);
            outline: none;
            font-family: inherit;
            font-size: 16px !important;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent-color, #6366f1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }
        .form-group input::placeholder {
            color: var(--text-tertiary, #6b7280);
        }
        .auth-btn {
            width: 100%;
            background: var(--accent-gradient, linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%));
            color: white;
            border: none;
            padding: clamp(12px, 2vw, 14px);
            border-radius: var(--radius-md, 10px);
            font-family: inherit;
            font-size: clamp(15px, 1.5vw, 16px);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .auth-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        .auth-btn:active { transform: translateY(0); }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: var(--radius-md, 10px);
            font-size: clamp(13px, 1.2vw, 14px);
            margin-bottom: clamp(16px, 2vw, 20px);
            display: none;
        }
        .auth-error.visible { display: block; }
        .auth-footer {
            text-align: center;
            margin-top: clamp(16px, 2vw, 20px);
            font-size: clamp(13px, 1.2vw, 14px);
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent-color, #6366f1);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-footer a:hover { text-decoration: underline; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            .auth-card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    <div class="auth-container">
        <div class="auth-header">
            <a href="/" class="auth-logo">
                <div class="auth-logo-ring"></div>
                <div class="auth-logo-text"><span>OXY</span> <span>AI</span></div>
            </a>
            <h1>Create an account</h1>
            <p>Join OXY AI and start conversing</p>
        </div>
        <div class="auth-card">
            <div class="auth-error" id="auth-error"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="John Doe" required autocomplete="name" autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password (min. 6 characters)" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="auth-btn" id="submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="/login.html">Sign in</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorEl = document.getElementById('auth-error');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating account...';
            errorEl.classList.remove('visible');
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    window.location.href = data.redirect || '/chat';
                } else {
                    errorEl.textContent = data.error || 'Registration failed. Please try again.';
                    errorEl.classList.add('visible');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Create Account';
            }
        });
    </script>
    <script src="persistence.js"></script>
</body>
</html>
