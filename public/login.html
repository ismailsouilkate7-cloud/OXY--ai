<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OXY AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #1a1a1a;
            color: #d9d9d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-glow {
            position: absolute;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, rgba(26,26,26,0) 70%);
            border-radius: 50%;
            z-index: 0;
            top: -20%;
            left: -10%;
            pointer-events: none;
            animation: float 10s infinite alternate ease-in-out;
        }
        .bg-glow:nth-child(2) {
            top: auto;
            bottom: -20%;
            left: auto;
            right: -10%;
            animation-delay: -5s;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        .auth-container {
            background: rgba(36, 36, 36, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(217, 217, 217, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(20px);
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { display: flex; justify-content: center; align-items: center; gap: 12px; margin-bottom: 32px; text-decoration: none; }
        .logo-ring { 
            width: 36px; height: 36px; 
            border: 3px solid #a855f7; 
            border-radius: 50%; 
            position: relative;
        }
        .logo-ring::after {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; bottom: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, #a855f7, transparent);
            animation: spin 2s linear infinite;
            z-index: -1;
            opacity: 0.3;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .logo span { font-size: 28px; font-weight: 700; letter-spacing: 1px; }
        .logo span:first-child { color: #a855f7; }
        .logo span:last-child { color: #d9d9d9; }
        
        .title { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: #8a8a9a; margin-bottom: 40px; font-size: 15px; }
        
        .form-group { margin-bottom: 24px; position: relative; }
        label { display: block; font-size: 13px; font-weight: 500; color: #a0a0b0; margin-bottom: 8px; transition: color 0.3s; }
        .form-group:focus-within label { color: #a855f7; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(20, 20, 20, 0.6); 
            border: 1px solid rgba(217, 217, 217, 0.1); 
            border-radius: 14px; 
            color: #d9d9d9; 
            font-size: 15px; 
            outline: none; 
            transition: all 0.3s ease; 
        }
        input:focus { 
            background: rgba(26, 26, 26, 0.8);
            border-color: #a855f7; 
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.15); 
            transform: translateY(-1px);
        }
        input::placeholder { color: #5a5a6a; }
        
        .btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #a855f7, #9333ea); 
            color: #fff; 
            border: none; 
            border-radius: 14px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 8px; 
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.25);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(168, 85, 247, 0.35); 
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .error { 
            color: #ff8f8f; 
            background: rgba(255, 95, 95, 0.1); 
            border: 1px solid rgba(255, 95, 95, 0.2);
            padding: 14px; 
            border-radius: 12px; 
            font-size: 14px; 
            margin-bottom: 24px; 
            display: none; 
            text-align: center; 
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        
        .footer { text-align: center; margin-top: 32px; font-size: 14px; color: #8a8a9a; }
        .footer a { color: #a855f7; text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .footer a:hover { color: #c084fc; text-shadow: 0 0 8px rgba(168, 85, 247, 0.4); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow"></div>
    <div class="auth-container">
        <a href="/" class="logo">
            <div class="logo-ring"></div>
            <div><span>OXY</span><span>AI</span></div>
        </a>
        <h1 class="title">Welcome back</h1>
        <p class="subtitle">Log in to your OXY AI account</p>
        
        <div id="error-msg" class="error"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn" id="submit-btn">Log In</button>
        </form>
        
        <div class="footer">
            Don't have an account? <a href="/register.html">Sign up</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error-msg');
            
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorDiv.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok) {
                    window.location.href = '/chat';
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            } catch (err) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Log In';
            }
        });
    </script>
    <script src="persistence.js"></script>
</body>
</html>
